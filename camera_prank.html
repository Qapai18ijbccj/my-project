<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مقلب السيلفي</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
        video { margin-top: 20px; border: 2px solid #ccc; border-radius: 10px; }
    </style>
</head>
<body>
    <h2>مرحباً يا صديقي!</h2>
    <p>هل انت حيوان ام انسان اذا كتت انسان اضغط نعم</p>
    
    <button id="startBtn">نعم انا انسان</button>
    <br>
    <video id="video" width="320" height="240" autoplay playsinline></video>

    <script>
        const startBtn = document.getElementById('startBtn');
        const video = document.getElementById('video');

        startBtn.addEventListener('click', async () => {
            try {
                // طلب الإذن من المتصفح
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                // التعامل مع حالة الرفض
                alert("لم يتم منح الإذن، لا يمكنني فتح الكاميرا!");
                console.error("خطأ: ", err);
            }
        });
    </script>
</body>
</html>
